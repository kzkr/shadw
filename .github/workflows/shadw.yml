# Shadw — surface the invisible decision trail on pull requests
# Reads git notes attached by the Shadw daemon and posts a PR comment
# showing the conversation dynamics behind each commit.
name: Shadw

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  decision-trail:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch Shadw notes
        run: git fetch origin refs/notes/shadw:refs/notes/shadw 2>/dev/null || true

      - name: Resolve PR context
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            # workflow_dispatch: find the open PR for the current branch
            BRANCH="${{ github.ref_name }}"
            PR_JSON=$(gh pr view "$BRANCH" --json number,baseRefOid,headRefOid 2>/dev/null || echo "")
            if [ -z "$PR_JSON" ]; then
              echo "found=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "number=$(echo "$PR_JSON" | jq -r '.number')" >> "$GITHUB_OUTPUT"
            echo "base=$(echo "$PR_JSON" | jq -r '.baseRefOid')" >> "$GITHUB_OUTPUT"
            echo "head=$(echo "$PR_JSON" | jq -r '.headRefOid')" >> "$GITHUB_OUTPUT"
          fi
          echo "found=true" >> "$GITHUB_OUTPUT"

      - name: Collect decision context
        if: steps.pr.outputs.found != 'false'
        id: decisions
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          BASE="${{ steps.pr.outputs.base }}"
          HEAD="${{ steps.pr.outputs.head }}"
          COMMITS=$(git rev-list "$BASE".."$HEAD" 2>/dev/null || echo "")

          OUTFILE="/tmp/shadw-body.md"
          : > "$OUTFILE"
          COUNT=0

          for SHA in $COMMITS; do
            NOTE=$(git notes --ref shadw show "$SHA" 2>/dev/null) || continue
            HASH_SHORT="${SHA:0:8}"
            COMMIT_URL="https://github.com/${REPO}/pull/${PR_NUMBER}/commits/${SHA}"

            TITLE=$(echo "$NOTE" | jq -r '.decisions[0]?.title // empty' 2>/dev/null)
            SUMMARY=$(echo "$NOTE" | jq -r '.decisions[0]?.summary // empty' 2>/dev/null)

            if [ -n "$SUMMARY" ]; then
              echo "<details>" >> "$OUTFILE"
              echo "<summary><strong><a href=\"${COMMIT_URL}\"><code>${HASH_SHORT}</code></a></strong> ${TITLE}</summary>" >> "$OUTFILE"
              echo "<br>" >> "$OUTFILE"
              echo "" >> "$OUTFILE"
              echo "${SUMMARY}" >> "$OUTFILE"
              echo "" >> "$OUTFILE"
              echo "</details>" >> "$OUTFILE"
              echo "" >> "$OUTFILE"
              COUNT=$((COUNT + 1))
            fi
          done

          if [ "$COUNT" -eq 0 ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            {
              echo "<!-- shadw-pr-decisions -->"
              echo "## Decision Trail"
              echo ""
              cat "$OUTFILE"
              echo "---"
              echo ""
              echo "Captured by [Shadw](https://shadw.dev)"
            } > /tmp/shadw-comment.md
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Post or update PR comment
        if: steps.decisions.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/shadw-comment.md', 'utf8');
            const marker = '<!-- shadw-pr-decisions -->';
            const prNumber = ${{ steps.pr.outputs.number }};

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body,
              });
            }
